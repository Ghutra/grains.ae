<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Grains Hub</title>
  <link rel="icon" href="/favicon.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .login-container .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-container .logo img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
    }

    .login-container .logo h1 {
      font-size: 24px;
      font-weight: 700;
      color: #C1A875;
      margin-top: 12px;
    }

    .login-container .logo p {
      color: #8888a0;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #b0b0c0;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #C1A875;
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 3px rgba(193,168,117,0.1);
    }

    .form-group input::placeholder {
      color: #666;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #c49b3f, #e3c46a);
      color: #1a1a2e;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(193,168,117,0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }

    .back-link a {
      color: #C1A875;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="logo">
      <img src="/assets/img/grains-logo.png" alt="Grains Hub">
      <h1>Admin Login</h1>
      <p>Secure access for site administrators</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid credentials</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@grains.ae" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <span id="btnText">Login</span>
        <span id="btnSpinner" style="display:none;">
          <span class="loading-spinner"></span>
        </span>
      </button>
    </form>

    <div class="back-link">
      <a href="/login.html">← Back to Trader Login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBz2Ha_cj42LI-Dh4VYkEOOsROt2WE9fDU",
      authDomain: "grains-hub.firebaseapp.com",
      projectId: "grains-hub",
      storageBucket: "grains-hub.firebasestorage.app",
      messagingSenderId: "783882873254",
      appId: "1:783882873254:web:ba93eaaff5eca25cd6c767",
      measurementId: "G-RHYCMRHS1Q"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Show loading
      loginBtn.disabled = true;
      btnText.textContent = 'Checking...';
      btnSpinner.style.display = 'inline';
      errorMsg.classList.remove('show');

      try {
        // 1. Sign in
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Check if admin
        const adminDoc = await getDoc(doc(db, "admins", user.uid));

        if (adminDoc.exists() && adminDoc.data().role === 'admin') {
          // ✅ Admin - redirect to admin dashboard
          window.location.href = '/admin/index.html';
        } else {
          // ❌ Not admin - show error
          errorText.textContent = 'This account does not have admin privileges.';
          errorMsg.classList.add('show');
          loginBtn.disabled = false;
          btnText.textContent = 'Login';
          btnSpinner.style.display = 'none';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorText.textContent = err.message || 'Invalid email or password.';
        errorMsg.classList.add('show');
        loginBtn.disabled = false;
        btnText.textContent = 'Login';
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
