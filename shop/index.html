<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Grains Shop | Grains Hub</title>
  <meta name="description" content="Dubai's trusted B2B grain shop. Verified suppliers, compliance-first, real-time stock. Filter by origin, grade, use." />
  <meta name="keywords" content="grains shop, Dubai B2B, verified rice, basmati, irri 6, FCL, compliance" />
  <link rel="canonical" href="https://grains.ae/shop" />
  <link rel="icon" href="/favicon.png" type="image/png" />

  <!-- Open Graph -->
  <meta property="og:title" content="The Grains Shop – Verified B2B Grain Hub" />
  <meta property="og:description" content="Specialist picks. Verified sources. Dubai's trusted B2B grain shop." />
  <meta property="og:image" content="https://grains.ae/assets/img/shop-hero.jpg" />
  <meta property="og:url" content="https://grains.ae/shop" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Store",
    "name": "The Grains Shop",
    "url": "https://grains.ae/shop",
    "image": "https://grains.ae/assets/img/shop-hero.jpg",
    "description": "Dubai's compliance-first B2B grain marketplace.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Al Ras, Dubai",
      "addressCountry": "AE"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+971585521976",
      "email": "letstalk@grains.ae",
      "contactType": "Customer Service"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/assets/css/core.css">
  <link rel="stylesheet" href="/assets/css/header.css">
  <link rel="stylesheet" href="/assets/css/footer.css">

  <style>
    /* ============================================================
       SHOP PAGE - Next Level Styles
       ============================================================ */

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fdfdf9;
      color: #1a1a2e;
      line-height: 1.7;
    }

    /* Hero */
    .shop-hero {
      padding: 80px 20px 60px;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #1a1a2e 100%);
      position: relative;
      color: #fff;
      text-align: center;
    }

    .shop-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('/assets/img/grain-texture.png') center/cover no-repeat;
      opacity: 0.05;
      z-index: 0;
    }

    .shop-hero > * {
      position: relative;
      z-index: 1;
    }

    .shop-hero img {
      width: 140px;
      margin-bottom: 16px;
      filter: drop-shadow(0 8px 30px rgba(0,0,0,0.3));
    }

    .shop-hero h1 {
      font-size: 38px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .shop-hero p {
      font-size: 18px;
      max-width: 700px;
      margin: 10px auto;
      opacity: 0.9;
    }

    /* ---------- FILTERS ---------- */
    .filter-section {
      background: #f8f5ec;
      padding: 40px 20px;
      border-bottom: 1px solid #e8e4d8;
    }

    .filter-section h2 {
      font-size: 22px;
      color: #a07c3b;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 700;
    }

    .filter-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-weight: 600;
      color: #a07c3b;
      font-size: 13px;
      text-align: left;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group select {
      padding: 12px 16px;
      border: 2px solid #e8e4d8;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
      color: #1a1a2e;
      cursor: pointer;
    }

    .filter-group select:focus {
      outline: none;
      border-color: #C1A875;
      box-shadow: 0 0 0 4px rgba(193, 168, 117, 0.12);
    }

    .filter-group select:hover {
      border-color: #C1A875;
    }

    /* ---------- RESULTS INFO ---------- */
    .results-info {
      max-width: 1200px;
      margin: 20px auto 0;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-info .count {
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }

    .results-info .reset-btn {
      padding: 8px 20px;
      border: 2px solid #e8e4d8;
      border-radius: 50px;
      background: transparent;
      color: #666;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .results-info .reset-btn:hover {
      border-color: #C1A875;
      color: #a07c3b;
      background: rgba(193, 168, 117, 0.05);
    }

    /* ---------- PRODUCT GRID ---------- */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    .product-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      transition: all 0.4s ease;
      border: 1px solid #f0ece6;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.1);
    }

    .product-card .image-wrapper {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: #f8f5ec;
    }

    .product-card .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .product-card:hover .image-wrapper img {
      transform: scale(1.05);
    }

    .product-card .image-wrapper .badge-top {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-top.verified {
      background: rgba(46, 204, 113, 0.9);
      color: #fff;
    }

    .badge-top.peer {
      background: rgba(52, 152, 219, 0.9);
      color: #fff;
    }

    .badge-top.booking {
      background: rgba(212, 175, 55, 0.9);
      color: #1a1a2e;
    }

    .product-card .content {
      padding: 20px;
    }

    .product-card .content h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .product-card .content .meta {
      font-size: 13px;
      color: #666;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
    }

    .product-card .content .meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .product-card .content .meta i {
      color: #C1A875;
      width: 16px;
    }

    .product-card .content .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 10px 0;
      padding: 10px 0;
      border-top: 1px solid #f0ece6;
      border-bottom: 1px solid #f0ece6;
    }

    .product-card .content .price-row .price {
      font-size: 1.3rem;
      font-weight: 800;
      color: #a07c3b;
    }

    .product-card .content .price-row .price small {
      font-size: 0.7rem;
      font-weight: 400;
      color: #999;
    }

    .product-card .content .price-row .kg-price {
      font-size: 13px;
      color: #666;
    }

    .product-card .content .stock-info {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    .product-card .content .stock-info .in-stock {
      color: #2ecc71;
      font-weight: 600;
    }

    .product-card .content .stock-info .booking {
      color: #f39c12;
      font-weight: 600;
    }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.3s ease;
      width: 100%;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-whatsapp:hover {
      background: #1ebe57;
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
    }

    .btn-whatsapp i {
      font-size: 1.2em;
    }

    /* ---------- LOADING & EMPTY ---------- */
    .loading-state, .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .loading-state .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #f0ece6;
      border-top-color: #C1A875;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-state p, .empty-state p {
      font-size: 16px;
      color: #a07c3b;
    }

    .empty-state .suggestion {
      margin-top: 12px;
      font-size: 14px;
      color: #999;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 768px) {
      .shop-hero h1 {
        font-size: 28px;
      }
      .shop-hero p {
        font-size: 16px;
      }

      .filter-form {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .results-info {
        flex-direction: column;
        text-align: center;
      }

      .product-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 0 12px 40px;
      }

      .product-card .image-wrapper {
        height: 150px;
      }

      .product-card .content {
        padding: 14px;
      }

      .product-card .content h3 {
        font-size: 1rem;
      }

      .product-card .content .price-row .price {
        font-size: 1.1rem;
      }
    }

    @media (max-width: 480px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .filter-form {
        grid-template-columns: 1fr;
      }

      .shop-hero {
        padding: 50px 16px 40px;
      }

      .shop-hero img {
        width: 100px;
      }
    }
  </style>
</head>
<body>

  <!-- ============================================================
     HEADER - Universal Include
  ============================================================ -->

  <!-- ============================================================
     HERO

  <section class="shop-hero">

  <section class="filter-section">

  <!-- ============================================================

  <div class="results-info">
    <span class="count" id="productCount">Loading products...</span>

     PRODUCT GRID
  ============================================================ -->
  <section>

      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading verified grains...</p>
      </div>
    </div>
  </section>

     FOOTER - Universal Include
