<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trader Dashboard – Grains Hub</title>
  <meta name="description" content="Your secure control center for grain trades, bookings, analytics & communication." />

  <link rel="icon" href="/favicon.png" type="image/png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Your existing :root and styles here — I kept them unchanged for brevity */
    /* ... paste your full <style> block from previous message ... */
  </style>
</head>
<body>

  <!-- Your HTML structure (sidebar + main-content) remains the same -->
  <div class="dashboard">
    <aside class="sidebar" id="sidebar">
      <!-- Your sidebar content unchanged -->
    </aside>

    <main class="main-content" id="contentArea">
      <div id="dashboardView">
        <!-- Your welcome-bar and card-grid unchanged -->
        <div class="table-container">
          <div class="card-header">Recent Bookings</div>
          <table>
            <thead>
              <tr>
                <th>Booking ID</th>
                <th>Commodity</th>
                <th>Quantity (MT)</th>
                <th>Origin → Dest</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="recentBookingsTable">
              <tr class="loading">
                <td colspan="6" style="text-align:center; padding:60px 0;">
                  <i class="fas fa-spinner fa-spin" style="font-size:32px; color:var(--primary-gold);"></i>
                  <div style="margin-top:16px;">Loading your bookings...</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Other views unchanged -->
    </main>
  </div>

  <!-- Footer unchanged -->

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const firebaseConfig = { /* your config unchanged */ };

    const app = initializeApp(firebaseConfig);
    const authInstance = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(authInstance, async (user) => {
      if (user) {
        document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];

        // Fetch ONLY current user's bookings
        const bookingsQuery = query(
          collection(db, "bookings"),
          where("userId", "==", user.uid),  // ← This filters to current user
          orderBy("createdAt", "desc"),
          limit(5)
        );

        try {
          const snapshot = await getDocs(bookingsQuery);
          const tableBody = document.getElementById('recentBookingsTable');
          tableBody.innerHTML = '';

          if (snapshot.empty) {
            tableBody.innerHTML = '<tr><td colspan="6" class="empty">No bookings found yet. Place your first order!</td></tr>';
          } else {
            snapshot.forEach(doc => {
              const data = doc.data();
              const statusClass = data.status === 'confirmed' ? 'status-confirmed' :
                                 data.status === 'shipped' ? 'status-shipped' : 'status-pending';
              tableBody.innerHTML += `
                <tr>
                  <td>${doc.id.slice(0,8).toUpperCase()}</td>
                  <td>${data.commodity || 'N/A'}</td>
                  <td>${data.quantity || '—'} MT</td>
                  <td>${data.originPort || '—'} → ${data.destinationPort || '—'}</td>
                  <td><span class="status-badge ${statusClass}">${(data.status || 'PENDING').toUpperCase()}</span></td>
                  <td><a href="#" style="color:var(--primary-gold); font-weight:500;">View Details</a></td>
                </tr>`;
            });
          }

          // Update counts (client-side for now)
          document.getElementById('activeBookingsCount').textContent = snapshot.size || '0';
          // TODO: Fetch full sum for totalVolume, pendingAmount
        } catch (err) {
          console.error("Firestore error:", err);
          document.getElementById('recentBookingsTable').innerHTML = '<tr><td colspan="6" class="empty">Error loading bookings. Please try again.</td></tr>';
        }
      } else {
        window.location.href = '/login.html';
      }
    });

    // Logout & hamburger (unchanged from your working version)
    // ... paste your existing logout and hamburger JS here ...
  </script>
</body>
</html>
