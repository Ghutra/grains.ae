<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCL Booking – Grains Hub</title>
  <meta name="description" content="Book full container loads (FCL) from India, Pakistan, Thailand. Verified logistics." />

  <link rel="icon" href="/favicon.png" type="image/png" />

  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary-gold: #C1A875;
      --primary-dark: #a07c3b;
      --text-dark: #1e1e1e;
      --text-muted: #6b7280;
      --bg-light: #f8f9fa;
      --border: #e5e7eb;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .navbar, .hamburger, .logo, .nav-links { /* your existing navbar styles */ }
    header { /* your header styles */ }

    .container {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .booking-form {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 15px;
    }

    select, input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s ease;
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--primary-gold);
      box-shadow: 0 0 0 3px rgba(193,168,117,0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--primary-gold);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 20px;
    }

    button:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 15px;
    }

    .success { background: rgba(16,185,129,0.1); color: var(--success); }
    .error { background: rgba(239,68,68,0.1); color: var(--danger); }

    .alliya-float { /* your existing */ }
  </style>
</head>
<body>

  <!-- Your navbar & header unchanged -->

  <div class="container">
    <div class="booking-form">
      <!-- STEP 1 -->
      <div class="step active" id="step1">
        <label>Origin</label>
        <select id="origin">
          <option value="India">India</option>
          <option value="Pakistan">Pakistan</option>
          <option value="Thailand">Thailand</option>
        </select>
        <button onclick="nextStep(2)">Next</button>
      </div>

      <!-- STEP 2 -->
      <div class="step" id="step2">
        <label>Container Type</label>
        <select id="container">
          <option value="20ft (24MT)">20ft (24MT)</option>
          <option value="40ft (48MT)">40ft (48MT)</option>
        </select>
        <button onclick="nextStep(3)">Next</button>
      </div>

      <!-- STEP 3 -->
      <div class="step" id="step3">
        <label>Grain Type / Commodity</label>
        <input id="grain" type="text" placeholder="e.g., Basmati 1121 Sella" required />
        <button onclick="nextStep(4)">Next</button>
      </div>

      <!-- STEP 4 – Customer Details -->
      <div class="step" id="step4">
        <label>Your Full Name</label>
        <input id="custName" type="text" placeholder="Your Name" required />

        <label>Email</label>
        <input id="custEmail" type="email" placeholder="you@example.com" required />

        <label>Phone</label>
        <input id="custPhone" type="tel" placeholder="+971..." required />

        <label>Company (optional)</label>
        <input id="custCompany" type="text" placeholder="Company Name" />

        <label>Destination Port</label>
        <input id="custDestination" type="text" placeholder="e.g., Jebel Ali" required />

        <label>Notes / Special Request (optional)</label>
        <textarea id="custMessage" rows="3" placeholder="Any notes or special instructions..."></textarea>

        <button id="submitBtn" onclick="submitFCL()">Submit Booking</button>

        <div id="formMessage" class="message" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- Alliya Float & Modal (unchanged) -->

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    // Initialize Firebase Auth (assuming firebase-init.js already loaded)
    const auth = getAuth();

    function nextStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${n}`).classList.add('active');
    }

    async function submitFCL() {
      const submitBtn = document.getElementById('submitBtn');
      const messageDiv = document.getElementById('formMessage');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      messageDiv.style.display = 'none';

      // Get form values
      const payload = {
        name: document.getElementById('custName').value.trim(),
        email: document.getElementById('custEmail').value.trim(),
        phone: document.getElementById('custPhone').value.trim(),
        company: document.getElementById('custCompany').value.trim() || "N/A",
        commodity: document.getElementById('grain').value.trim() || "Any",
        quantity: document.getElementById('container').value.includes("20ft") ? 24 : 48,
        containerType: document.getElementById('container').value,
        originPort: document.getElementById('origin').value,
        destinationPort: document.getElementById('custDestination').value.trim(),
        message: document.getElementById('custMessage').value.trim()
      };

      // Basic validation
      if (!payload.name || !payload.email || !payload.phone || !payload.destinationPort) {
        messageDiv.textContent = "Please fill all required fields.";
        messageDiv.className = "message error";
        messageDiv.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Booking";
        return;
      }

      try {
        const user = auth.currentUser;
        if (!user) {
          messageDiv.textContent = "Please login to continue.";
          messageDiv.className = "message error";
          messageDiv.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.innerHTML = "Submit Booking";
          return;
        }

        payload.userId = user.uid;  // ← Critical: send user ID

        const res = await fetch("https://api-oim3h2hfza-uc.a.run.app/bookings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success && data.bookingId) {
          messageDiv.textContent = "Booking submitted successfully! Redirecting...";
          messageDiv.className = "message success";
          messageDiv.style.display = 'block';
          setTimeout(() => {
            window.location.href = `/fcl/confirmation.html?id=${encodeURIComponent(data.bookingId)}`;
          }, 1500);
        } else {
          messageDiv.textContent = data.error || "Something went wrong. Please try again.";
          messageDiv.className = "message error";
          messageDiv.style.display = 'block';
        }
      } catch (e) {
        messageDiv.textContent = "Network error. Please check your connection.";
        messageDiv.className = "message error";
        messageDiv.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "Submit Booking";
      }
    }
  </script>

  <!-- Your other scripts (alliya, stock, include, etc.) unchanged -->
</body>
</html>
