<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCL Booking – Grains Hub</title>
  <meta name="description" content="Book full container loads from verified origins." />

  <link rel="icon" href="/favicon.png" type="image/png" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --primary-gold: #C1A875;
      --primary-dark: #a07c3b;
      --text-dark: #1e1e1e;
      --text-muted: #6b7280;
      --bg: #f9f9f9;
      --card: #ffffff;
      --border: #e5e7eb;
      --success: #10b981;
      --danger: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* Reuse your navbar & header styles here */
    .navbar { /* your existing navbar */ }
    header { /* your existing header */ }

    .container {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .form-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 40px 32px;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    label {
      display: block;
      margin: 20px 0 8px;
      font-weight: 600;
      color: var(--text-muted);
      font-size: 15px;
    }

    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary-gold);
      box-shadow: 0 0 0 3px rgba(193,168,117,0.15);
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--primary-gold);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 24px;
    }

    button:hover:not(:disabled) {
      background: var(--primary-dark);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-size: 15px;
      display: none;
    }

    .success { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .error { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }

    .alliya-float { /* your existing */ }
  </style>
</head>
<body>

  <!-- Your existing navbar + header -->

  <div class="container">
    <div class="form-card">
      <!-- Step 1 -->
      <div class="step active" id="step1">
        <label>Origin</label>
        <select id="origin">
          <option value="India">India</option>
          <option value="Pakistan">Pakistan</option>
          <option value="Thailand">Thailand</option>
        </select>
        <button onclick="nextStep(2)">Next</button>
      </div>

      <!-- Step 2 -->
      <div class="step" id="step2">
        <label>Container Type</label>
        <select id="container">
          <option value="20ft (24MT)">20ft (24MT)</option>
          <option value="40ft (48MT)">40ft (48MT)</option>
        </select>
        <button onclick="nextStep(3)">Next</button>
      </div>

      <!-- Step 3 -->
      <div class="step" id="step3">
        <label>Commodity / Grain Type</label>
        <input id="commodity" type="text" placeholder="e.g. Basmati 1121 Sella" required />
        <button onclick="nextStep(4)">Next</button>
      </div>

      <!-- Step 4 – Details -->
      <div class="step" id="step4">
        <label>Full Name</label>
        <input id="name" type="text" placeholder="Your full name" required />

        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" required />

        <label>Phone</label>
        <input id="phone" type="tel" placeholder="+971..." required />

        <label>Company (optional)</label>
        <input id="company" type="text" placeholder="Company name" />

        <label>Destination Port</label>
        <input id="destinationPort" type="text" placeholder="e.g. Jebel Ali" required />

        <label>Notes (optional)</label>
        <textarea id="message" rows="3" placeholder="Any special instructions..."></textarea>

        <button id="submitBtn">Submit Booking Request</button>

        <div id="formMessage" class="message"></div>
      </div>
    </div>
  </div>

  <!-- Alliya modal unchanged -->

  <script type="module">
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

    const auth = getAuth();

    function nextStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step${n}`).classList.add('active');
    }

    document.getElementById('submitBtn').addEventListener('click', async () => {
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('formMessage');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
      msg.style.display = 'none';

      const payload = {
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        company: document.getElementById('company').value.trim() || "N/A",
        commodity: document.getElementById('commodity').value.trim() || "Any",
        quantity: document.getElementById('container').value.includes("20ft") ? 24 : 48,
        containerType: document.getElementById('container').value,
        originPort: document.getElementById('origin').value,
        destinationPort: document.getElementById('destinationPort').value.trim(),
        message: document.getElementById('message').value.trim()
      };

      if (!payload.name || !payload.email || !payload.phone || !payload.destinationPort) {
        msg.textContent = "Please fill all required fields.";
        msg.className = "message error";
        msg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = "Submit Booking Request";
        return;
      }

      try {
        const user = auth.currentUser;
        if (!user) throw new Error("Please login to continue");

        payload.userId = user.uid;

        const res = await fetch("https://api-oim3h2hfza-uc.a.run.app/bookings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (data.success && data.bookingId) {
          msg.textContent = "Booking submitted! Redirecting to confirmation...";
          msg.className = "message success";
          msg.style.display = 'block';
          setTimeout(() => {
            window.location.href = `/fcl/confirmation.html?id=${encodeURIComponent(data.bookingId)}`;
          }, 1500);
        } else {
          throw new Error(data.error || "Booking failed");
        }
      } catch (err) {
        msg.textContent = err.message.includes("login") ? "Please login first." : err.message;
        msg.className = "message error";
        msg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = "Submit Booking Request";
      }
    });
  </script>

  <!-- Your other scripts (alliya, stock, etc.) -->
</body>
</html>
